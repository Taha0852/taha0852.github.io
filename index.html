<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taha'nın Dünyası</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0f172a;
            color: white;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .container {
            text-align: center;
            padding: 2rem;
            border: 2px solid #38bdf8;
            border-radius: 15px;
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
        }
        h1 { color: #38bdf8; margin-bottom: 10px; }
        p { font-size: 1.2rem; opacity: 0.8; }
        .badge {
            display: inline-block;
            padding: 5px 15px;
            background: #38bdf8;
            color: #0f172a;
            border-radius: 20px;
            font-weight: bold;
            margin-top: 20px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>Merhaba, Ben Taha! 👋</h1>
        <p>Bu benim GitHub üzerinden 7/24 yayınlanan ilk web sitem.</p>
        <div class="badge">Site Aktif</div>
    </div>
</body>
</html>
