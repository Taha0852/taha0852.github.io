<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taha'nın Oyun Dünyası</title>
    <style>
        /* CSS - Görsel Tasarım */
        :root {
            --primary: #38bdf8;
            --bg: #0f172a;
            --card: #1e293b;
        }

        body {
            font-family: 'Segoe UI', sans-serif;
            background-color: var(--bg);
            color: white;
            margin: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        header {
            padding: 2rem;
            text-align: center;
        }

        h1 { color: var(--primary); margin: 0; }

        .game-container {
            background: var(--card);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.5);
            width: 90%;
            max-width: 400px;
            text-align: center;
            border: 1px solid rgba(255,255,255,0.1);
        }

        input {
            padding: 10px;
            border-radius: 8px;
            border: none;
            width: 60%;
            margin: 10px 0;
            font-size: 1rem;
        }

        button {
            padding: 10px 20px;
            background: var(--primary);
            color: var(--bg);
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            transform: scale(1.05);
            filter: brightness(1.1);
        }

        #message {
            margin-top: 15px;
            font-weight: bold;
            min-height: 24px;
        }

        .stats {
            margin-top: 20px;
            font-size: 0.9rem;
            opacity: 0.7;
        }
    </style>
</head>
<body>

    <header>
        <h1>Taha Arcade 🎮</h1>
        <p>En sevdiğim oyunlar burada!</p>
    </header>

    <div class="game-container">
        <h3>Sayı Tahmin Oyunu</h3>
        <p>1 ile 100 arasında bir sayı tuttum. Bil bakalım?</p>
        
        <input type="number" id="guessInput" placeholder="Sayıyı gir...">
        <br>
        <button onclick="checkGuess()">Tahmin Et</button>
        
        <p id="message"></p>
        
        <div class="stats">
            Deneme Sayısı: <span id="attempts">0</span>
        </div>
        <button onclick="resetGame()" style="margin-top: 20px; background: #94a3b8; font-size: 0.8rem;">Yeniden Başlat</button>
    </div>

    <script>
        /* JS - Oyun Mantığı */
        let targetNumber = Math.floor(Math.random() * 100) + 1;
        let attempts = 0;

        function checkGuess() {
            const input = document.getElementById('guessInput');
            const message = document.getElementById('message');
            const attemptsDisplay = document.getElementById('attempts');
            const userGuess = parseInt(input.value);

            if (isNaN(userGuess) || userGuess < 1 || userGuess > 100) {
                message.textContent = "Lütfen 1-100 arası geçerli bir sayı gir! ⚠️";
                message.style.color = "#fbbf24";
                return;
            }

            attempts++;
            attemptsDisplay.textContent = attempts;

            if (userGuess === targetNumber) {
                message.textContent = `Tebrikler! ${attempts} denemede bildin! 🎉`;
                message.style.color = "#4ade80";
            } else if (userGuess < targetNumber) {
                message.textContent = "Daha büyük bir sayı dene! ⬆️";
                message.style.color = "#38bdf8";
            } else {
                message.textContent = "Daha küçük bir sayı dene! ⬇️";
                message.style.color = "#38bdf8";
            }
            
            input.value = "";
            input.focus();
        }

        function resetGame() {
            targetNumber = Math.floor(Math.random() * 100) + 1;
            attempts = 0;
            document.getElementById('attempts').textContent = "0";
            document.getElementById('message').textContent = "Yeni oyun başladı!";
            document.getElementById('guessInput').value = "";
        }
    </script>
</body>
</html>
